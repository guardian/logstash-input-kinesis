input {
  kinesis {
    kinesis_stream_name => "test-logstash-stream"
    application_name => "logstash-integration-test"
    region => "us-east-1"
    codec => "json"
    checkpoint_interval_seconds => 10
    kinesis_endpoint => "http://localstack:4566"
    dynamodb_endpoint => "http://localstack:4566"
    cloudwatch_endpoint => "http://localstack:4566"
  }
}

filter {
  # Add a marker field to verify processing
  mutate {
    add_field => { "[@metadata][test_processed]" => "true" }
  }
}

output {
  # Send to http mock server
  http {
    url => "http://http-mock:1080/logstash-events"
    http_method => "post"
    format => "json"
    content_type => "application/json"
    automatic_retries => 3
    retry_non_idempotent => true
    socket_timeout => 10
    connect_timeout => 10
    pool_max => 50
    pool_max_per_route => 25
  }
  
  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
